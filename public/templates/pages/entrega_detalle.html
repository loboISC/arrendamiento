<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de Entrega - SAPT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme-dark.css">
  <style>
    body { margin:0; background:#f7f9fb; font-family:'Segoe UI',Arial,sans-serif; color:#232323; }
    .container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 18px; box-shadow: 0 2px 12px rgba(41,121,255,0.07); padding: 36px 40px; }
    .title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; }
    .info-row { display: flex; gap: 32px; margin-bottom: 24px; }
    .info-block { flex:1; background:#f7f9fb; border-radius:12px; padding:18px 22px; }
    .info-label { color:#888; font-size:1rem; margin-bottom:4px; }
    .info-value { font-size:1.15rem; font-weight:600; }
    .status-badge { display:inline-flex;align-items:center;gap:6px;font-size:1rem;font-weight:600;border-radius:8px;padding:4px 12px; }
    .status-programada { background:#fffbe6; color:#b59b00; }
    .status-route { background:#e3f0ff; color:#2979ff; }
    .map-block { margin-top:32px; }
    .map-title { font-weight:600; margin-bottom:10px; }
    iframe { border-radius:14px; border:none; width:100%; height:320px; }
    .back-btn { background:#2979ff; color:#fff; border:none; border-radius:8px; padding:10px 18px; font-size:1rem; font-weight:600; cursor:pointer; margin-bottom:24px; }
    .back-btn:hover { background:#1565c0; }
  </style>
</head>
<body>
  <div class="container" id="detalleContainer">
    <button class="back-btn" onclick="window.history.back()"><i class="fa fa-arrow-left"></i> Volver</button>
    <div class="title">Detalle de Entrega</div>
    <div class="subtitle">Información detallada de la entrega programada</div>
    <div id="detalleContent">
      <!-- Aquí se cargará la información -->
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const asignacionId = params.get('id');
    const detalleContent = document.getElementById('detalleContent');
    let watchId = null;

    async function cargarDetalle() {
      try {
        const response = await fetch(`/api/logistica/asignaciones/${asignacionId}`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        
        if (!response.ok) throw new Error('No se pudo cargar el detalle');
        
        const data = await response.json();
        renderizar(data);
      } catch (error) {
        detalleContent.innerHTML = `<div style='color:#f44336;font-weight:600;font-size:1.2rem;'>${error.message}</div>`;
      }
    }

    function renderizar(entrega) {
      const direccion = `${entrega.calle} ${entrega.numero_externo}, ${entrega.colonia}, ${entrega.municipio}`;
      const mapaUrl = `https://www.google.com/maps?q=${encodeURIComponent(direccion)}&output=embed`;
      
      const estadoBadge = {
        'en_espera': '<span class="status-badge status-programada"><i class="fa fa-clock"></i> En Espera</span>',
        'asignado': '<span class="status-badge status-programada"><i class="fa fa-calendar"></i> Asignado</span>',
        'en_ruta': '<span class="status-badge status-route"><i class="fa fa-truck"></i> En Ruta</span>',
        'completado': '<span class="status-badge" style="background:#e6f9f0;color:#1abc9c"><i class="fa fa-check-circle"></i> Completado</span>'
      }[entrega.estado] || entrega.estado;

      detalleContent.innerHTML = `
        <div class="info-row">
          <div class="info-block">
            <div class="info-label">Cliente</div>
            <div class="info-value">${entrega.cliente || 'N/A'}</div>
            <div class="info-label">Dirección de Entrega</div>
            <div class="info-value">${direccion}</div>
          </div>
          <div class="info-block">
            <div class="info-label">Contrato</div>
            <div class="info-value">${entrega.numero_contrato || 'N/A'}</div>
            <div class="info-label">Estado Actual</div>
            ${estadoBadge}
          </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 24px;">
           <button id="btnIniciarRuta" class="back-btn" style="flex:1; background:#27ae60;">
             <i class="fa fa-play"></i> INICIAR RUTA (ACTIVAR GPS)
           </button>
           <button id="btnVerHoja" class="back-btn" style="flex:1; background:#e67e22;">
             <i class="fa fa-file-pdf"></i> VER HOJA DE PEDIDO
           </button>
        </div>

        <div class="map-block">
          <div class="map-title"><i class="fa fa-map-marker-alt"></i> Guía de Ruta</div>
          <iframe id="mapaIframe" src="${mapaUrl}" allowfullscreen="" loading="lazy"></iframe>
        </div>
        
        <div id="trackingStatus" style="margin-top:10px; font-size:0.9rem; color:#666; text-align:center;">
          GPS Desactivado
        </div>
      `;

      document.getElementById('btnIniciarRuta').addEventListener('click', iniciarTracking);
      document.getElementById('btnVerHoja').addEventListener('click', () => {
        // Guardamos el ID en session para que la hoja lo use
        sessionStorage.setItem('idContratoParaPDF', entrega.pedido_id);
        window.location.href = `../pdf_templates/hoja_pedido2.html?id_contrato=${entrega.pedido_id}`;
      });
    }

    function iniciarTracking() {
      if (!navigator.geolocation) {
        alert("Tu navegador no soporta geolocalización");
        return;
      }

      const btn = document.getElementById('btnIniciarRuta');
      const status = document.getElementById('trackingStatus');
      
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        btn.innerHTML = '<i class="fa fa-play"></i> REANUDAR RUTA';
        btn.style.background = '#27ae60';
        status.innerHTML = "GPS Pausado";
        return;
      }

      btn.innerHTML = '<i class="fa fa-pause"></i> PAUSAR RUTA';
      btn.style.background = '#f39c12';
      status.innerHTML = "Buscando señal GPS...";

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, speed } = pos.coords;
          enviarTracking(latitude, longitude, speed);
          status.innerHTML = `GPS Activo: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        },
        (err) => {
          console.error(err);
          status.innerHTML = "Error de GPS: " + err.message;
        },
        { enableHighAccuracy: true }
      );
    }

    async function enviarTracking(lat, lon, speed) {
      try {
        await fetch('/api/logistica/tracking', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({
            asignacion_id: asignacionId,
            latitud: lat,
            longitud: lon,
            velocidad: speed || 0
          })
        });
      } catch (e) {
        console.error("Error enviando coordenadas", e);
      }
    }

    if (asignacionId) cargarDetalle();
  </script>
</body>
</html>
