<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme-dark.css">
  <link rel="stylesheet" href="styles/forms-responsive.css">
  <title>Bienvenido - SAPT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="icon" href="/assets/images/LOGO_ANDAMIOS_02.png" type="image/x-icon" />
  <style>
    :root {
      --primary: #1b3c5e;
      --accent: #da3347;
      --sidebar-width: 280px;
      --header-height: 64px;
      --bg-main: #f0f2f5;
      --surface: #ffffff;
      --text: #15253a;
      --muted: #60708a;
      --line: rgba(15, 40, 70, 0.1);
      --shadow: 0 10px 28px rgba(15, 40, 70, 0.14);
    }

    body.light-mode {
      --primary: #234d78;
      --accent: #cc2b4f;
      --bg-main: #f6f8fc;
      --surface: #ffffff;
      --text: #1a2940;
      --muted: #5f718f;
      --line: rgba(16, 42, 74, 0.12);
      --shadow: 0 10px 24px rgba(12, 37, 68, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text);
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .menu-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1300;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--primary);
      color: #fff;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
      z-index: 1200;
      transition: transform 0.28s ease;
    }

    .profile {
      text-align: center;
      padding: 14px 10px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      margin-bottom: 10px;
    }

    .profile h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .profile p {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.82rem;
    }

    .nav {
      flex: 1;
      overflow-y: auto;
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .menu-item {
      width: 100%;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 9px;
      font-size: 1rem;
      text-align: left;
      transition: background 0.2s ease;
    }

    .menu-item i {
      width: 18px;
      text-align: center;
    }

    .menu-item:hover,
    .menu-item.active {
      background: rgba(255, 255, 255, 0.14);
    }

    .menu-folder {
      margin-top: 2px;
    }

    .menu-folder > .menu-item {
      font-weight: 700;
    }

    .submenu {
      margin: 6px 0 0 28px;
      padding-left: 10px;
      border-left: 1px dashed rgba(255, 255, 255, 0.35);
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
    }

    .menu-folder.open .submenu {
      max-height: 520px;
      opacity: 1;
    }

    .submenu .menu-item {
      font-size: 0.92rem;
      padding: 8px 10px;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.92);
    }

    .submenu .menu-item i {
      width: 14px;
      font-size: 0.78rem;
    }

    .folder-header .folder-arrow {
      margin-left: auto;
      transition: transform 0.2s ease;
      font-size: 0.82rem;
      opacity: 0.9;
    }

    .menu-folder.open .folder-header .folder-arrow {
      transform: rotate(90deg);
    }

    .sidebar-bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .theme-toggle,
    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 9px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn {
      color: #ffdfe5;
      border-color: rgba(218, 51, 71, 0.45);
      background: rgba(218, 51, 71, 0.17);
    }

    .main-layout {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin-left 0.28s ease, width 0.28s ease;
    }

    .topbar {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 700;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .sidebar-slide-toggle {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .sidebar-slide-toggle:hover {
      background: var(--surface-soft);
      transform: translateY(-1px);
    }

    body.sidebar-hidden .sidebar {
      transform: translateX(-104%);
    }

    body.sidebar-hidden .main-layout {
      margin-left: 0;
      width: 100%;
    }

    #main-content {
      padding: 18px;
      flex: 1;
    }

    .view-enter {
      opacity: 0;
      transform: translateY(10px);
      animation: viewIn 0.28s ease forwards;
    }

    @keyframes viewIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-section {
      background: var(--surface);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .user-welcome {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 8px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .welcome-avatar {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
      box-shadow: var(--shadow);
    }

    #welcomeMessage {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 3rem);
      color: #000;
    }

    .welcome-mascot {
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mascot-gif {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .hero-section {
      position: relative;
      width: 100%;
      min-height: 460px;
      background: linear-gradient(45deg, var(--primary) 0%, #0a1925 100%);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 26px 28px;
    }

    .hero-content {
      width: 52%;
      color: #fff;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .datetime-display,
    .quote-display {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    .time {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }

    .date {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .quote-text {
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .quote-author {
      color: var(--accent);
      text-align: right;
      font-weight: 600;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.12;
      color: #fff;
      max-width: 620px;
    }

    .hero-subtitle {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.08rem;
    }

    .hero-image {
      position: absolute;
      right: -90px;
      top: 0;
      width: 62%;
      height: 100%;
      z-index: 1;
    }

    .featured-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.84);
      mask-image: linear-gradient(to left, black 52%, transparent 100%);
      -webkit-mask-image: linear-gradient(to left, black 52%, transparent 100%);
    }

    .mascot-container {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 120px;
      height: 120px;
      z-index: 3;
      animation: floatY 3s ease-in-out infinite;
    }

    .mascot-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 5px 14px rgba(0, 0, 0, 0.4));
    }

    @keyframes floatY {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    .module-shell {
      width: 100%;
      height: calc(100vh - var(--header-height) - 36px);
      min-height: 620px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .module-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    body.dark-theme .topbar {
      background: #0f1a29;
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }

    body.dark-theme #main-content {
      background: #071222;
    }

    body.dark-theme .module-shell {
      background: #0b1626;
      border-color: rgba(130, 166, 216, 0.22);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.38);
    }

    body.dark-theme .module-frame {
      background: #0b1626;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 0.92rem;
    }

    th {
      background: #f7f9fc;
      color: #1f3050;
    }

    tbody tr:hover {
      background: #f1f6ff;
    }

    .badge {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .badge.active {
      background: rgba(20, 154, 89, 0.16);
      color: #0f7e4e;
    }

    .badge.pending {
      background: rgba(226, 157, 30, 0.16);
      color: #9a6407;
    }

    .mobile-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1190;
    }

    /* ===== MEDIA QUERIES - RESPONSIVIDAD MEJORADA ===== */
    
    /* Tablets y pantallas medianas (1024px - 1280px) */
    @media (max-width: 1280px) {
      :root {
        --sidebar-width: 240px;
        --header-height: 56px;
      }

      #main-content {
        padding: 14px;
      }

      .panel {
        padding: 12px;
        margin-bottom: 12px;
      }

      .module-shell {
        height: calc(100vh - 56px - 32px);
        min-height: 520px;
      }
    }

    /* Tablets (1024px) */
    @media (max-width: 1024px) {
      :root {
        --sidebar-width: 220px;
      }

      .user-welcome {
        flex-direction: column;
        gap: 16px;
      }

      .user-info {
        width: 100%;
      }

      .welcome-avatar {
        width: 100px;
        height: 100px;
      }

      .hero-section {
        padding: 16px;
        min-height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .hero-content {
        width: 100%;
      }

      .hero-image {
        position: relative;
        right: 0;
        width: 100%;
        height: 280px;
        mask-image: none;
        -webkit-mask-image: none;
      }

      .mascot-container {
        display: none;
      }

      .hero-title {
        font-size: clamp(1.6rem, 4vw, 2.8rem);
      }

      #main-content {
        padding: 12px;
      }
    }

    /* Tablets pequeños - iPad horizontal (768px - 980px) */
    @media (max-width: 980px) {
      :root {
        --sidebar-width: 200px;
        --header-height: 52px;
      }

      .menu-toggle {
        display: inline-flex;
      }

      .sidebar {
        width: 64px;
        padding: 12px 8px;
        transition: width 0.28s ease;
      }

      .sidebar:hover,
      body.sidebar-open .sidebar {
        width: var(--sidebar-width);
      }

      .sidebar:hover .profile h3,
      .sidebar:hover .profile p,
      .sidebar:hover .menu-item span,
      .sidebar:hover .submenu .menu-item,
      body.sidebar-open .profile h3,
      body.sidebar-open .profile p,
      body.sidebar-open .menu-item span,
      body.sidebar-open .submenu .menu-item {
        display: inline;
      }

      .profile h3,
      .profile p,
      .menu-item span,
      .submenu .menu-item {
        display: none;
      }

      .profile {
        padding: 12px 6px;
        gap: 8px;
      }

      .profile img {
        width: 80px;
        height: 80px;
      }

      .main-layout {
        margin-left: 64px;
        width: calc(100% - 64px);
      }

      .topbar {
        padding: 0 16px;
        height: 52px;
      }

      #view-title {
        font-size: 1.2rem;
      }

      .sidebar-slide-toggle {
        width: 32px;
        height: 32px;
        font-size: 0.9rem;
      }

      .module-shell {
        height: calc(100vh - 52px - 24px);
        min-height: 480px;
      }

      #main-content {
        padding: 10px;
      }
    }

    /* Móviles grandes - iPhone 12 Pro Max (480px - 768px) */
    @media (max-width: 768px) {
      :root {
        --sidebar-width: 280px;
        --header-height: 48px;
      }

      .menu-toggle {
        display: inline-flex;
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
      }

      .sidebar {
        width: var(--sidebar-width);
        transform: translateX(-104%);
        z-index: 1200;
        box-shadow: 2px 0 16px rgba(0, 0, 0, 0.2);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      body.sidebar-open .mobile-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .profile img {
        width: 90px;
        height: 90px;
      }

      .menu-item {
        padding: 10px;
        font-size: 0.95rem;
      }

      .main-layout {
        margin-left: 0;
        width: 100%;
      }

      .topbar {
        padding: 0 12px;
        height: 48px;
        gap: 8px;
      }

      .topbar-left {
        gap: 8px;
      }

      #view-title {
        font-size: 1.1rem;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #clock-text {
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .sidebar-slide-toggle {
        display: none;
      }

      .module-shell {
        height: calc(100vh - 48px - 16px);
        min-height: 420px;
        border-radius: 8px;
      }

      .panel {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
      }

      #main-content {
        padding: 8px;
      }

      .user-welcome {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 12px;
      }

      .user-info {
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .welcome-avatar {
        width: 90px;
        height: 90px;
        border: 3px solid var(--accent);
      }

      #welcomeMessage {
        font-size: 1.6rem;
      }

      .hero-title {
        font-size: clamp(1.4rem, 3vw, 2rem);
      }

      .hero-subtitle {
        font-size: 0.95rem;
      }

      .time {
        font-size: 2rem;
      }

      .date {
        font-size: 0.9rem;
      }

      th,
      td {
        padding: 8px;
        font-size: 0.85rem;
      }

      .submenu {
        margin-left: 16px;
        padding-left: 8px;
      }

      .welcome-mascot {
        display: none;
      }
    }

    /* Móviles pequeños (320px - 480px) */
    @media (max-width: 480px) {
      :root {
        --sidebar-width: 260px;
        --header-height: 44px;
      }

      body {
        overflow-x: hidden;
      }

      .menu-toggle {
        width: 36px;
        height: 36px;
        top: 8px;
        left: 8px;
        font-size: 1rem;
      }

      .sidebar {
        width: var(--sidebar-width);
      }

      .profile {
        padding: 10px 8px 14px;
      }

      .profile img {
        width: 80px;
        height: 80px;
        margin-bottom: 8px;
      }

      .profile h3 {
        font-size: 0.95rem;
      }

      .profile p {
        font-size: 0.75rem;
      }

      .menu-item {
        padding: 9px;
        font-size: 0.9rem;
        gap: 8px;
      }

      .menu-item i {
        width: 16px;
        font-size: 0.9rem;
      }

      .topbar {
        padding: 0 10px;
        height: 44px;
        flex-wrap: wrap;
        gap: 4px;
      }

      .topbar-left {
        width: 100%;
        gap: 6px;
      }

      #view-title {
        font-size: 1rem;
      }

      #clock-text {
        font-size: 0.8rem;
      }

      .module-shell {
        height: calc(100vh - 44px - 12px);
        min-height: 380px;
        border-radius: 6px;
      }

      #main-content {
        padding: 6px;
      }

      .panel {
        padding: 8px;
        margin-bottom: 8px;
        border-radius: 6px;
      }

      .user-welcome {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 10px;
      }

      #welcomeMessage {
        font-size: 1.4rem;
        line-height: 1.2;
      }

      .hero-title {
        font-size: 1.2rem;
      }

      .hero-subtitle {
        font-size: 0.9rem;
      }

      .time {
        font-size: 1.7rem;
      }

      .date {
        font-size: 0.85rem;
      }

      th,
      td {
        padding: 6px 4px;
        font-size: 0.75rem;
      }

      .theme-toggle,
      .logout-btn {
        padding: 8px 10px;
        font-size: 0.85rem;
      }

      .sidebar-bottom {
        padding-top: 10px;
        gap: 6px;
      }
    }

    /* Ultra móviles (< 320px) */
    @media (max-width: 320px) {
      #welcomeMessage {
        font-size: 1.2rem;
      }

      .hero-title {
        font-size: 1.05rem;
      }

      .time {
        font-size: 1.4rem;
      }

      th,
      td {
        padding: 4px 2px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
    <i class="fa-solid fa-bars"></i>
  </button>

  <div class="mobile-backdrop" id="mobile-backdrop"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="profile">
        <img id="profile-avatar" src="/assets/images/LOGO_ANDAMIOS_02.png" alt="Perfil" />
        <h3 id="profile-name">Cargando...</h3>
        <p>Bienvenido - SAPT</p>
      </div>

      <nav class="nav" id="nav-list"></nav>

      <div class="sidebar-bottom">
        <button class="theme-toggle" id="theme-toggle" type="button">
          <span><i class="fa-solid fa-circle-half-stroke"></i> Tema</span>
          <strong id="theme-label">Dark</strong>
        </button>
        <button class="logout-btn" id="logout-btn" type="button">
          <span><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <main class="main-layout">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebar-slide-toggle" class="sidebar-slide-toggle" type="button" aria-label="Ocultar menú lateral" title="Ocultar/Mostrar menú">
            <i id="sidebar-slide-icon" class="fa-solid fa-angles-left"></i>
          </button>
          <h1 id="view-title">Principal</h1>
        </div>

    async function validateAuthentication() {
      // Limpiar siempre los flags de sesión al cargar esta página
      sessionStorage.removeItem('auth_redirecting');
      sessionStorage.removeItem('auth_checked');

      const token = localStorage.getItem('token');

      // Sin token → ir a login inmediatamente
      if (!token) {
        console.log('[Auth] No hay token. Redirigiendo a login...');
        window.location.replace('login.html');
        return false;
      }

      try {
        const response = await fetch('/api/auth/verify', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`Token inválido: ${response.status}`);
        }

        console.log('[Auth] Token válido. Acceso permitido.');
        return true;

      } catch (error) {
        console.error('[Auth] Token rechazado:', error.message);
        // Limpiar sesión completamente y redirigir
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.replace('login.html');
        return false;
      }
    }

    validateAuthentication().then((isAuthenticated) => {
      if (isAuthenticated) {
        initializeApp();
      }
    });

      buildNav() {
        const markup = this.menuItems
          .map((item) => {
            if (item.type === "folder") {
              const children = item.children
                .map(
                  (child) =>
                    `<button class="menu-item submenu-item" type="button" data-view="${child.id}"><i class="fa-solid ${child.icon}"></i><span>${child.label}</span></button>`
                )
                .join("");
              return `
                <div class="menu-folder">
                  <button class="menu-item folder-header" type="button" data-view="${item.defaultView}" data-folder-parent="${item.id}">
                    <i class="fa-solid ${item.icon}"></i><span>${item.label}</span><i class="fa-solid fa-chevron-right folder-arrow"></i>
                  </button>
                  <div class="submenu">${children}</div>
                </div>
              `;
            }
            return `<button class="menu-item" type="button" data-view="${item.id}"><i class="fa-solid ${item.icon}"></i><span>${item.label}</span></button>`;
          })
          .join("");
        this.navList.innerHTML = markup;

      bindEvents() {
        this.navList.addEventListener("click", (event) => {
          const btn = event.target.closest("button[data-view]");
          if (!btn) return;
          const isFolderHeader = btn.classList.contains("folder-header");
          if (isFolderHeader) {
            const folder = btn.closest(".menu-folder");
            if (folder && folder.classList.contains("open")) {
              folder.classList.remove("open");
              return;
            }
          }
          this.MapsTo(btn.dataset.view);
        });

        window.addEventListener("hashchange", () => this.routeFromHash());

        this.themeToggle.addEventListener("click", () => {
          const nextTheme = this.currentTheme === "dark" ? "light" : "dark";
          this.setGlobalTheme(nextTheme);
        });

        this.menuToggle.addEventListener("click", () => {
          document.body.classList.toggle("sidebar-open");
        });

        this.sidebarSlideToggle.addEventListener("click", () => {
          const willHide = !document.body.classList.contains("sidebar-hidden");
          this.setSidebarHidden(willHide);
        });

        this.mobileBackdrop.addEventListener("click", () => {
          document.body.classList.remove("sidebar-open");
        });

        document.getElementById("logout-btn").addEventListener("click", () => {
          // Limpiar sesión completamente (token + datos de usuario + flags)
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          sessionStorage.removeItem("auth_checked");
          sessionStorage.removeItem("auth_redirecting");
          window.location.replace("login.html");
        });
      }

      hydrateProfile() {
        let user = {};
        try {
          user = JSON.parse(localStorage.getItem("user") || "{}");
        } catch (_) {}

        const name = user.nombre || user.username || null;

        // Si no hay nombre de usuario, la sesión es inválida → cerrar sesión
        if (!name) {
          console.warn('[Auth] Datos de usuario ausentes. Cerrando sesión...');
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          sessionStorage.removeItem('auth_checked');
          sessionStorage.removeItem('auth_redirecting');
          window.location.replace('login.html');
          return;
        }

        document.getElementById("profile-name").textContent = name;
        if (typeof user.foto === "string" && user.foto.startsWith("data:image")) {
          document.getElementById("profile-avatar").src = "/assets/images/LOGO_ANDAMIOS_02.png";
          this.welcomePhoto = user.foto;
        } else {
          this.welcomePhoto = "/assets/images/LOGO_ANDAMIOS_02.png";
        }
        this.userName = name;
      }

      restoreTheme() {
        this.currentTheme = this.getStoredTheme();
        this.applyThemeUI(this.currentTheme);
      }

      restoreSidebarState() {
        const hidden = localStorage.getItem("sidebar_hidden") === "1";
        this.setSidebarHidden(hidden);
      }

      setSidebarHidden(hidden) {
        document.body.classList.toggle("sidebar-hidden", hidden);
        localStorage.setItem("sidebar_hidden", hidden ? "1" : "0");
        this.sidebarSlideIcon.className = hidden ? "fa-solid fa-angles-right" : "fa-solid fa-angles-left";
        this.sidebarSlideToggle.setAttribute("aria-label", hidden ? "Mostrar menú lateral" : "Ocultar menú lateral");
        this.sidebarSlideToggle.setAttribute("title", hidden ? "Mostrar menú" : "Ocultar menú");
      }

      getStoredTheme() {
        try {
          const cfg = JSON.parse(localStorage.getItem("scaffoldpro_config") || "{}");
          const tema = cfg?.apariencia?.tema;
          if (tema === "dark" || tema === "light") return tema;
          if (tema === "system") {
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
        } catch (_) {}
        return localStorage.getItem("spa_theme") || "light";
      }

      setGlobalTheme(theme) {
        this.currentTheme = theme;
        localStorage.setItem("spa_theme", theme);
        try {
          const cfg = JSON.parse(localStorage.getItem("scaffoldpro_config") || "{}");
          cfg.apariencia = cfg.apariencia || {};
          cfg.apariencia.tema = theme;
          localStorage.setItem("scaffoldpro_config", JSON.stringify(cfg));
        } catch (_) {}
        this.applyThemeUI(theme);
      }

      applyThemeUI(theme) {
        const isLight = theme === "light";
        document.body.classList.toggle("light-mode", isLight);
        document.body.classList.toggle("dark-theme", !isLight);
        this.themeLabel.textContent = isLight ? "Light" : "Dark";
        this.applyThemeToEmbeddedModules(theme);
      }

      applyThemeToEmbeddedModules(theme) {
        const isDark = theme === "dark";
        document.querySelectorAll(".module-frame").forEach((frame) => {
          try {
            const body = frame.contentDocument?.body;
            if (!body) return;
            body.classList.toggle("dark-theme", isDark);
            body.classList.toggle("light-mode", !isDark);
          } catch (_) {}
        });
      }

      routeFromHash() {
        const hashView = window.location.hash.replace("#", "").trim();
        const viewId = this.routes[hashView] ? hashView : "dashboard";
        this.MapsTo(viewId, false);
      }

      MapsTo(viewId, pushHash = true) {
        const route = this.routes[viewId] || this.routes.dashboard;

        if (pushHash && window.location.hash !== `#${viewId}`) {
          window.location.hash = viewId;
        }

        this.mainContent.innerHTML = "";
        const view = route.render();
        view.classList.add("view-enter");
        this.mainContent.appendChild(view);
        this.viewTitle.textContent = route.label;

        this.navList.querySelectorAll(".menu-item[data-view]").forEach((item) => {
          item.classList.toggle("active", item.dataset.view === viewId);
        });

        this.syncFolderState(route, viewId);

        document.body.classList.remove("sidebar-open");
      }

      syncFolderState(route, viewId) {
        const folders = this.navList.querySelectorAll(".menu-folder");
        folders.forEach((folder) => folder.classList.remove("open"));

        if (route.parent) {
          const parentBtn = this.navList.querySelector(`.folder-header[data-folder-parent="${route.parent}"]`);
          const folder = parentBtn ? parentBtn.closest(".menu-folder") : null;
          if (parentBtn) parentBtn.classList.add("active");
          if (folder) folder.classList.add("open");
          return;
        }

        const folderHeader = this.navList.querySelector(`.folder-header[data-view="${viewId}"]`);
        if (folderHeader) {
          const folder = folderHeader.closest(".menu-folder");
          if (folder) folder.classList.add("open");
        }
      }

        shell.className = "module-shell";
        const frame = document.createElement("iframe");
        frame.className = "module-frame";
        frame.src = path;
        frame.title = `Módulo ${path}`;
        frame.loading = "lazy";
        frame.addEventListener("load", () => {
          this.applyThemeToEmbeddedModules(this.currentTheme || this.getStoredTheme());
        });
        shell.appendChild(frame);
        wrap.appendChild(shell);
        return wrap;
      }

      startClock() {
        const tick = () => {
          this.clockText.textContent = new Date().toLocaleString("es-MX", {
            weekday: "short",
            day: "2-digit",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        };
        tick();
        setInterval(() => {
          tick();
          this.updateDashboardDateTime();
        }, 1000);
      }

      updateDashboardDateTime() {
        const timeEl = document.getElementById("current-time");
        const dateEl = document.getElementById("current-date");
        if (!timeEl || !dateEl) return;

        const now = new Date();
        timeEl.textContent = now.toLocaleTimeString("es-MX", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        });
        dateEl.textContent = now.toLocaleDateString("es-MX", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }
    }

    // Instanciar la aplicación

    window.MapsTo = App.MapsTo.bind(App);
