<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia - RH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/styles/rh/rh_vars.css">
    <link rel="stylesheet" href="/styles/rh/rh_asistencia.css">
</head>
<body class="light-mode">
    <div class="header-actions">
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fa-solid fa-fingerprint" style="font-size:24px; color:var(--primary);"></i>
            <h2 style="margin:0;">Control de Asistencia</h2>
        </div>
        <div class="filters-row">
            <input type="date" class="form-control" id="dateFilter">
            <select class="form-control" id="employeeFilter">
                <option value="all">Todos los empleados</option>
            </select>
            <button class="btn btn-secondary" onclick="vistaPreviaReloj()" id="btnPreview" title="Ver lo que hay en el reloj sin guardar">
                <i class="fa-solid fa-eye"></i> Vista Previa (Hoy)
            </button>
            <button class="btn btn-primary" onclick="sincronizarReloj()" id="btnSync">
                <i class="fa-solid fa-rotate"></i> Sincronizar Reloj
            </button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Empleado</th>
                    <th>ID Biométrico</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>Método</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="attendanceTableBody">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="edit-modal-overlay" style="display:none;">
        <div class="edit-modal">
            <h4 id="editModalTitle">Editar Registro</h4>
            <p id="editModalSub"></p>
            <select id="editStatusSelect">
                <option value="OK">OK</option>
                <option value="Retardo">Retardo</option>
                <option value="Justificado">Justificado</option>
                <option value="Error">Error</option>
            </select>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModalEdicion()">Cancelar</button>
                <button class="btn-save" onclick="guardarEdicion()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/scripts/rh/rh_common.js"></script>
    <script src="/scripts/rh/rh_asistencia.js"></script>
</body>
</html>
