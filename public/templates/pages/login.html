<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inicio de sesion- SAPT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="icon" href="assets/images/LOGO_ANDAMIOS_02.png" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <script src="theme.js"></script>
  <style>
    :root {
      --primary: #1B3C5E;
      --accent: #DA3347;
      --card-bg: rgba(255, 255, 255, 0.14);
      --card-border: rgba(255, 255, 255, 0.35);
      --text-strong: #F3F6F9;
      --text-muted: #D5DEE8;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text-strong);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Fondo básico como fallback; el tema lo sobrescribe */
      background-color: #0e1e2e;
    }

    .login-container {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      padding: 48px 36px 36px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .brand-badge {
      position: absolute;
      top: -74px;
      left: 50%;
      transform: translateX(-50%);
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2c5279, var(--primary));
      display: grid;
      place-items: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35), 0 0 22px rgba(27, 60, 94, 0.65);
      border: 2px solid rgba(255, 255, 255, 0.25);
    }

    .brand-badge img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.25));
    }

    .logo {
      margin-top: 36px;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--text-strong), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @media (max-width: 480px) {
      .brand-badge {
        width: 108px;
        height: 108px;
        top: -54px;
      }

      .logo {
        margin-top: 24px;
      }
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 1.05rem;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #E6EEF8;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon i {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1rem;
      opacity: 0.9;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 2px solid rgba(230, 238, 248, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #F7FAFF;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }

    .form-group input::placeholder {
      color: #cfd8e3;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(218, 51, 71, 0.18);
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .remember-row input {
      accent-color: var(--accent);
    }

    .forgot-link {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .forgot-link:hover {
      color: var(--accent);
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, #2D6AA6 100%);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.06s ease, filter 0.2s ease;
      margin-top: 10px;
      box-shadow: 0 8px 18px rgba(27, 60, 94, 0.35);
    }

    .login-btn:hover {
      filter: brightness(1.05);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    .login-btn:disabled {
      filter: grayscale(0.25) brightness(0.9);
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(218, 51, 71, 0.12);
      color: #ffb3bd;
      border: 1px solid rgba(218, 51, 71, 0.35);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      font-size: 0.9rem;
    }

    .success-message {
      background: rgba(46, 204, 113, 0.12);
      color: #d7ffea;
      border: 1px solid rgba(46, 204, 113, 0.35);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      font-size: 0.9rem;
    }

    .loading {
      display: none;
      margin-left: 10px;
    }

    .loading i {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <!-- Cargar el tema después del CSS inline para que pueda sobrescribir -->
  <link rel="stylesheet" href="theme-dark.css">
</head>

<body class="theme-dark">
  <div class="login-container">
    <div class="brand-badge">
      <img src="assets/images/LOGO_ANDAMIOS_02.png" alt="Andamios Torres" />
    </div>
    <div class="logo" id="login-title">Inicio de Sesión</div>
    <div class="subtitle" id="login-subtitle">Ingresa tus credenciales para continuar</div>

    <div class="error-message" id="error-message"></div>
    <div class="success-message" id="success-message"></div>

    <!-- PASO 1: Usuario + Contraseña -->
    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-with-icon">
          <i class="fa fa-user"></i>
          <input type="text" id="username" name="username" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-with-icon">
          <i class="fa fa-lock"></i>
          <input type="password" id="password" name="password" required>
        </div>
      </div>

      <div class="remember-row">
        <label><input type="checkbox" id="rememberMe"> Recuérdame</label>
        <a class="forgot-link" href="recuperar.html">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        Iniciar Sesión
        <span class="loading" id="loading">
          <i class="fa fa-spinner"></i>
        </span>
      </button>
    </form>

    <!-- PASO 2: Código OTP -->
    <form id="otp-form" style="display:none;">
      <div style="text-align:center;margin-bottom:18px;">
        <div style="width:56px;height:56px;background:rgba(27,60,94,0.2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;">
          <i class="fa fa-envelope-open-text" style="font-size:1.5rem;color:#a0c4ff;"></i>
        </div>
        <p id="otp-desc" style="color:var(--text-muted);font-size:0.92rem;margin:0;"></p>
      </div>

      <div class="form-group">
        <label for="otp-code">Código de verificación</label>
        <div class="input-with-icon">
          <i class="fa fa-key"></i>
          <input type="text" id="otp-code" name="otp-code" maxlength="6" placeholder="000000"
            pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
            style="text-align:center;font-size:1.6rem;letter-spacing:8px;font-weight:700;" required>
        </div>
      </div>

      <div style="text-align:center;margin-bottom:14px;font-size:0.88rem;color:var(--text-muted);">
        El código expira en <strong id="otp-timer" style="color:var(--accent);">5:00</strong>
      </div>

      <button type="submit" class="login-btn" id="otp-btn">
        Verificar Código
        <span class="loading" id="otp-loading">
          <i class="fa fa-spinner"></i>
        </span>
      </button>

      <div style="text-align:center;margin-top:14px;">
        <button type="button" id="resend-btn"
          style="background:none;border:none;color:var(--text-muted);font-size:0.88rem;cursor:pointer;text-decoration:underline;">
          ¿No llegaste el código? Reenviar
        </button>
        <button type="button" id="back-to-login-btn"
          style="background:none;border:none;color:var(--text-muted);font-size:0.88rem;cursor:pointer;margin-left:12px;">
          ← Volver
        </button>
      </div>
    </form>
  </div>

  <script>
    // Estado del flujo
    let pendingUserId = null;
    let pendingToken = null;
    let pendingUser = null;
    let otpTimerInterval = null;

    const errorMsg   = document.getElementById('error-message');
    const successMsg = document.getElementById('success-message');

    function showError(msg)  { errorMsg.textContent = msg;  errorMsg.style.display = 'block';  successMsg.style.display = 'none'; }
    function showSuccess(msg){ successMsg.textContent = msg; successMsg.style.display = 'block'; errorMsg.style.display  = 'none'; }
    function hideMessages() { errorMsg.style.display = 'none'; successMsg.style.display = 'none'; }

    function finalizarLogin(token, user) {
      showSuccess('Acceso concedido. Redirigiendo...');
      localStorage.setItem('token', token);
      localStorage.setItem('user', typeof user === 'string' ? user : JSON.stringify(user));
      
      // Limpiar rastro de sesión previa
      sessionStorage.removeItem('auth_checked');
      sessionStorage.removeItem('auth_redirecting');

      setTimeout(() => {
        window.location.replace('principal.html');
      }, 600);
    }

    /* =================== PASO 1: LOGIN =================== */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');
      const loading  = document.getElementById('loading');

      loginBtn.disabled = true;
      loading.style.display = 'inline';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Credenciales incorrectas');
          return;
        }

        // Limpiar flags de sesión
        sessionStorage.removeItem('auth_checked');
        sessionStorage.removeItem('auth_redirecting');

        if (data.requires2fa) {
          // Usuario tiene 2FA activo → ir a paso 2
          pendingUserId = data.userId;
          pendingToken  = data.token;
          pendingUser   = JSON.stringify(data.user);
          await requestOtp();
        } else {
          // Sin 2FA → acceso directo
          finalizarLogin(data.token, data.user);
        }

      } catch (err) {
        showError('Error de conexión. Intenta nuevamente.');
      } finally {
        loginBtn.disabled = false;
        loading.style.display = 'none';
      }
    });

    /* =================== SOLICITAR OTP =================== */
    async function requestOtp() {
      hideMessages();
      try {
        const res = await fetch('/api/auth/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: pendingUserId })
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Error al enviar OTP'); return; }

        // Mostrar panel OTP
        document.getElementById('login-form').style.display  = 'none';
        document.getElementById('otp-form').style.display    = 'block';
        document.getElementById('login-title').textContent   = 'Verificación';
        document.getElementById('login-subtitle').textContent = 'Ingresa el código enviado a tu correo';
        document.getElementById('otp-desc').textContent = `Código enviado a ${data.maskedEmail}`;
        document.getElementById('otp-code').value = '';
        document.getElementById('otp-code').focus();

        startOtpTimer(5 * 60);
        showSuccess(`Código enviado a ${data.maskedEmail}`);

      } catch (err) {
        showError('Error al enviar el código. Intenta de nuevo.');
      }
    }

    /* =================== TEMPORIZADOR =================== */
    function startOtpTimer(seconds) {
      clearInterval(otpTimerInterval);
      const timerEl = document.getElementById('otp-timer');
      let remaining = seconds;

      otpTimerInterval = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining / 60).toString().padStart(2, '0');
        const s = (remaining % 60).toString().padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;

        if (remaining <= 0) {
          clearInterval(otpTimerInterval);
          timerEl.textContent = 'Expirado';
          showError('El código ha expirado. Solicita uno nuevo.');
        }
      }, 1000);
    }

    /* =================== PASO 2: VERIFICAR OTP =================== */
    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const code    = document.getElementById('otp-code').value.trim();
      const otpBtn  = document.getElementById('otp-btn');
      const loading = document.getElementById('otp-loading');

      otpBtn.disabled = true;
      loading.style.display = 'inline';

      try {
        const res = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: pendingUserId, code })
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Código incorrecto'); return; }

        clearInterval(otpTimerInterval);
        showSuccess('Verificado. Accediendo al sistema...');
        localStorage.setItem('token', pendingToken);
        localStorage.setItem('user', pendingUser);

        setTimeout(() => window.location.replace('principal.html'), 800);

      } catch (err) {
        showError('Error al verificar el código.');
      } finally {
        otpBtn.disabled = false;
        loading.style.display = 'none';
      }
    });

    /* =================== REENVIAR =================== */
    document.getElementById('resend-btn').addEventListener('click', () => requestOtp());

    /* =================== VOLVER =================== */
    document.getElementById('back-to-login-btn').addEventListener('click', () => {
      clearInterval(otpTimerInterval);
      pendingUserId = null;
      pendingToken  = null;
      pendingUser   = null;
      document.getElementById('otp-form').style.display   = 'none';
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('login-title').textContent   = 'Inicio de Sesión';
      document.getElementById('login-subtitle').textContent = 'Ingresa tus credenciales para continuar';
      hideMessages();
    });

    /* =================== AUTO-REDIRECT si ya hay sesión =================== */
    window.addEventListener('load', async () => {
      const token = localStorage.getItem('token');
      if (!token) return;

      try {
        const res = await fetch('/api/auth/verify', {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) window.location.replace('principal.html');
        else { localStorage.removeItem('token'); localStorage.removeItem('user'); }
      } catch (_) {}
    });
  </script>
</body>

</html>
