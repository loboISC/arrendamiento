<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- VALIDACIÓN CRÍTICA DE JWT - DEBE EJECUTARSE ANTES DE TODO -->
  <script>
    (function criticalAuthCheck() {
      const token = localStorage.getItem('token');
      const isRedirecting = sessionStorage.getItem('auth_redirecting') === 'true';
      
      // Si ya está redirigiendo, salir
      if (isRedirecting) {
        console.log('[AUTH-CRITICAL] Ya está en proceso de redirección...');
        return;
      }
      
      // Si NO hay token, BLOQUEAR INMEDIATAMENTE
      if (!token || token === 'null' || token === '') {
        console.log('[AUTH-CRITICAL] ❌ NO HAY TOKEN VÁLIDO. BLOQUEANDO ACCESO...');
        sessionStorage.setItem('auth_redirecting', 'true');
        document.documentElement.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:18px;text-align:center;"><div><h1>Acceso Denegado</h1><p>Redirigiendo al login...</p></div></div>';
        document.body.style.margin = '0';
        document.body.style.padding = '0';
        // Usar location.replace para evitar que el usuario vuelva atrás
        setTimeout(() => window.location.replace('login.html'), 500);
        throw new Error('AUTH_BLOCKED: No token found');
      }
      
      console.log('[AUTH-CRITICAL] ✅ Token encontrado. Página permitida.');
    })();
  </script>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme-dark.css" />
  <link rel="stylesheet" href="styles/responsive-graphics.css" />
  <link rel="stylesheet" href="styles/forms-responsive.css" />
  <link rel="stylesheet" href="styles/icons-fix.css" />
  <title>Cotizaciones - SAPT</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --page-bg: #f2f5fb;
      --panel: #ffffff;
      --panel-soft: #f8faff;
      --text: #10223d;
      --muted: #5f6c82;
      --stroke: #d9e1ef;
      --brand: #2f77ff;
      --brand-soft: #eaf1ff;
      --success: #0f9b67;
      --warning: #d2861f;
      --radius-xl: 18px;
      --radius-md: 12px;
      --shadow: 0 10px 28px rgba(15, 32, 64, 0.08);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 0% 0%, #f7faff 0%, var(--page-bg) 45%);
      min-height: 100vh;
    }

    body:not(.light-mode) {
      --page-bg: #071325;
      --panel: #0f1d33;
      --panel-soft: #152844;
      --text: #edf3ff;
      --muted: #9cb0d1;
      --stroke: #233a62;
      --brand: #57a1ff;
      --brand-soft: #183c70;
      --success: #31b47f;
      --warning: #e2ac50;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      background: radial-gradient(circle at 0% 0%, #102743 0%, var(--page-bg) 45%);
    }

    .quotes-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px clamp(14px, 2.5vw, 28px) 30px;
      display: grid;
      gap: 18px;
    }

    .quotes-header {
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 20px clamp(16px, 2.4vw, 28px);
      display: grid;
      gap: 10px;
    }

    .quotes-header h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.8vw, 2.1rem);
    }

    .quotes-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .quote-card {
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 14px;
      min-height: 380px;
    }

    .quote-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .quote-card__label {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .quote-card__icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-grid;
      place-items: center;
      background: var(--brand-soft);
      color: var(--brand);
      border: 1px solid var(--stroke);
      font-size: 0.95rem;
    }

    .quote-card__badge {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--panel-soft);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .quote-card__new {
      border: 0;
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 11px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .quote-card__new:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .quote-card__list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .quote-item {
      border: 1px solid var(--stroke);
      background: var(--panel-soft);
      border-radius: var(--radius-md);
      padding: 11px;
      display: grid;
      gap: 8px;
    }

    .quote-item__row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .quote-item__folio {
      margin: 0;
      font-weight: 700;
      font-size: 0.94rem;
      letter-spacing: 0.2px;
    }

    .quote-item__meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .quote-item__client {
      margin: 0;
      font-size: 0.86rem;
      color: var(--muted);
      min-height: 18px;
    }

    .quote-item__actions {
      display: flex;
      gap: 8px;
    }

    .quote-item__btn {
      border: 1px solid var(--stroke);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.81rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quote-item__btn:hover {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .quote-empty {
      border: 1px dashed var(--stroke);
      border-radius: var(--radius-md);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 0.9rem;
      padding: 14px;
      text-align: center;
    }

    .cards-loading {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: -4px;
    }

    .card-renta .quote-card__icon { color: #2f77ff; }
    .card-venta .quote-card__icon { color: #0f9b67; }
    .card-servicios .quote-card__icon { color: #c47916; }

    @media (max-width: 1100px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
      .quote-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <script>
    // VALIDACIÓN ASÍNCRONA SECUNDARIA - Solo para verificar token con servidor
    async function validateJWTWithServer() {
      const token = localStorage.getItem('token');
      if (!token) return; // Ya fue bloqueado en head

      try {
        const response = await fetch('/api/auth/verify', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          timeout: 5000
        });

        if (!response.ok) throw new Error(`Token validation failed: ${response.status}`);
        console.log('[AUTH] ✅ Token validado correctamente con servidor');
        sessionStorage.removeItem('auth_redirecting');
        return true;

      } catch (error) {
        console.error('[AUTH] ❌ Error validando token con servidor:', error);
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        sessionStorage.setItem('auth_redirecting', 'true');
        alert('Su sesión ha expirado. Será redirigido al login.');
        window.location.replace('login.html');
        return false;
      }
    }

    validateJWTWithServer();
  </script>

  <main class="quotes-page">
    <header class="quotes-header">
      <h1>Cotizaciones</h1>
      <p>Selecciona un módulo para crear cotizaciones y revisa rápidamente las más recientes.</p>
      <span class="cards-loading" id="cards-loading">Cargando últimas cotizaciones...</span>
    </header>

    <section class="cards-grid" aria-label="Tipos de cotización">
      <article class="quote-card card-renta" data-type="RENTA">
        <div class="quote-card__head">
          <div class="quote-card__label">
            <span class="quote-card__icon"><i class="fa-solid fa-calendar-days"></i></span>
            <span>Rentas</span>
          </div>
          <span class="quote-card__badge" data-count>0 recientes</span>
        </div>
        <button class="quote-card__new" type="button" data-new-url="cotizacion_renta.html">
          + Nueva cotización de renta
        </button>
        <ul class="quote-card__list" data-list></ul>
      </article>

      <article class="quote-card card-venta" data-type="VENTA">
        <div class="quote-card__head">
          <div class="quote-card__label">
            <span class="quote-card__icon"><i class="fa-solid fa-cart-shopping"></i></span>
            <span>Ventas</span>
          </div>
          <span class="quote-card__badge" data-count>0 recientes</span>
        </div>
        <button class="quote-card__new" type="button" data-new-url="cotizacion_venta.html">
          + Nueva cotización de venta
        </button>
        <ul class="quote-card__list" data-list></ul>
      </article>

      <article class="quote-card card-servicios" data-type="SERVICIO">
        <div class="quote-card__head">
          <div class="quote-card__label">
            <span class="quote-card__icon"><i class="fa-solid fa-screwdriver-wrench"></i></span>
            <span>Servicios</span>
          </div>
          <span class="quote-card__badge" data-count>0 recientes</span>
        </div>
        <button class="quote-card__new" type="button" data-new-url="cotizacion_servicios.html">
          + Nueva cotización de servicio
        </button>
        <ul class="quote-card__list" data-list></ul>
      </article>
    </section>
  </main>

  <script>
    class CotizacionesPage {
      constructor() {
        this.apiUrl = '/api/cotizaciones';
        this.token = localStorage.getItem('token');
        this.root = document;
        this.typeConfig = {
          RENTA: {
            listUrl: 'cotizaciones-lista.html?tipo=RENTA',
            editBase: 'cotizacion_renta.html'
          },
          VENTA: {
            listUrl: 'cotizaciones-lista.html?tipo=VENTA',
            editBase: 'cotizacion_venta.html'
          },
          SERVICIO: {
            listUrl: 'cotizaciones-lista.html?tipo=SERVICIO',
            editBase: 'cotizacion_servicios.html'
          }
        };
      }

      init() {
        this.bindCreateButtons();
        this.loadLatest();
      }

      bindCreateButtons() {
        this.root.querySelectorAll('[data-new-url]').forEach((btn) => {
          btn.addEventListener('click', () => {
            window.location.href = btn.getAttribute('data-new-url');
          });
        });
      }

      normalizeType(value) {
        if (!value) return '';
        return String(value)
          .trim()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toUpperCase();
      }

      async loadLatest() {
        const loading = this.root.getElementById('cards-loading');
        if (!this.token) {
          this.renderFallbackFromSession();
          if (loading) loading.textContent = 'Sin sesión activa. Mostrando datos locales de referencia.';
          return;
        }

        try {
          const response = await fetch(this.apiUrl, {
            headers: { Authorization: `Bearer ${this.token}` }
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const rows = await response.json();
          this.renderLists(Array.isArray(rows) ? rows : []);
          if (loading) loading.remove();
        } catch (error) {
          this.renderFallbackFromSession();
          if (loading) loading.textContent = 'No se pudieron cargar cotizaciones del servidor. Mostrando datos disponibles localmente.';
          console.error('Error cargando cotizaciones:', error);
        }
      }

      renderLists(rows) {
        const grouped = { RENTA: [], VENTA: [], SERVICIO: [] };

        rows.forEach((item) => {
          const type = this.normalizeType(item.tipo);
          if (grouped[type]) grouped[type].push(item);
        });

        Object.keys(grouped).forEach((key) => {
          grouped[key] = grouped[key].slice(0, 4);
        });

        this.renderType('RENTA', grouped.RENTA);
        this.renderType('VENTA', grouped.VENTA);

        const serviceRows = grouped.SERVICIO.length > 0 ? grouped.SERVICIO : this.getServiceFallbackRows();
        this.renderType('SERVICIO', serviceRows);
      }

      renderType(type, rows) {
        const card = this.root.querySelector(`.quote-card[data-type="${type}"]`);
        if (!card) return;

        const count = card.querySelector('[data-count]');
        const list = card.querySelector('[data-list]');
        if (!list) return;

        const items = Array.isArray(rows) ? rows : [];
        count.textContent = `${items.length} recientes`;
        list.innerHTML = '';

        if (items.length === 0) {
          list.innerHTML = '<li class="quote-empty">Aún no hay cotizaciones recientes en este módulo.</li>';
          return;
        }

        items.forEach((item, index) => {
          const li = document.createElement('li');
          li.className = 'quote-item';
          const id = item.id_cotizacion || item.id || `tmp-${type}-${index}`;
          const folio = item.numero_cotizacion || item.folio || `COT-${id}`;
          const fecha = this.formatDate(item.fecha_creacion || item.fecha || item.created_at);
          const cliente = item.cliente_nombre || item.nombre_cliente || item.cliente || 'Cliente no definido';
          const viewHref = this.buildViewUrl(type, id);
          const editHref = this.buildEditUrl(type, id, item);

          li.innerHTML = `
            <div class="quote-item__row">
              <p class="quote-item__folio">${this.escapeHtml(folio)}</p>
              <p class="quote-item__meta">${this.escapeHtml(fecha)}</p>
            </div>
            <p class="quote-item__client">${this.escapeHtml(cliente)}</p>
            <div class="quote-item__actions">
              <a class="quote-item__btn" href="${this.escapeHtml(viewHref)}"><i class="fa-regular fa-eye"></i> Ver</a>
              <a class="quote-item__btn" href="${this.escapeHtml(editHref)}"><i class="fa-regular fa-pen-to-square"></i> Editar</a>
            </div>
          `;

          list.appendChild(li);
        });
      }

      buildViewUrl(type, id) {
        const cfg = this.typeConfig[type];
        if (!cfg) return '#';
        if (type === 'SERVICIO') {
          return `cotizacion_servicios.html?view=${encodeURIComponent(id)}`;
        }
        return `${cfg.listUrl}&id=${encodeURIComponent(id)}`;
      }

      buildEditUrl(type, id, item) {
        const cfg = this.typeConfig[type];
        if (!cfg) return '#';
        if (type === 'SERVICIO') {
          return `cotizacion_servicios.html?edit=${encodeURIComponent(id)}`;
        }
        if (item && item.id_cotizacion) {
          return `${cfg.editBase}?edit=${encodeURIComponent(item.id_cotizacion)}`;
        }
        return `${cfg.editBase}?edit=${encodeURIComponent(id)}`;
      }

      formatDate(value) {
        if (!value) return 'Sin fecha';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return 'Sin fecha';
        return new Intl.DateTimeFormat('es-MX', {
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        }).format(date);
      }

      getServiceFallbackRows() {
        const raw = sessionStorage.getItem('lastQuote');
        if (!raw) return [];

        try {
          const data = JSON.parse(raw);
          return [{
            id: data.id || 'local-service',
            numero_cotizacion: data.numeroCotizacion || 'SERV-LOCAL',
            fecha_creacion: data.fecha || new Date().toISOString(),
            cliente_nombre: data.cliente?.nombre || 'Cliente servicio'
          }];
        } catch (error) {
          console.error('No se pudo leer lastQuote:', error);
          return [];
        }
      }

      renderFallbackFromSession() {
        this.renderType('RENTA', []);
        this.renderType('VENTA', []);
        this.renderType('SERVICIO', this.getServiceFallbackRows());
      }

      escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const page = new CotizacionesPage();
      page.init();
    });
  </script>
</body>
</html>
